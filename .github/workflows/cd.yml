# ---------------------------------------------------------
# CD WORKFLOW - CI/CD Python Exam
# ---------------------------------------------------------

name: CD   

# ---------------------------------------------------------
# Automatic trigerring after CI
# ---------------------------------------------------------
on:
  workflow_run:
    workflows: ["CI"]   
    types:
      - completed       
      
jobs:
  build:
    runs-on: ubuntu-latest

    # -----------------------------------------------------
    # Condition: run this job only if CI has succeeded
    # -----------------------------------------------------
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:

      # ------------------------------
      # First step : code recovery
      # ------------------------------
      - name: checkout
        uses: actions/checkout@v5

      # ------------------------------
      # Second step : Docker Hub connexion
      # ------------------------------
      - name: login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  
          password: ${{ secrets.DOCKER_PASSWORD }}  

      # ------------------------------
      # Third step : Build + Push Docker
      # ------------------------------
      - name: build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .                     
          file: ./Dockerfile             
          push: true                     
          tags: ${{ secrets.DOCKER_USERNAME }}/calculator:latest   
